<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="light-mode">
    <header>
      <nav class="container">
        <a href="home.html" class="logo">MY PORTFOLIO</a>
        <button class="hamburger-menu">☰</button>
        <div class="nav-links">
          <button class="nav-button" id="experience-btn">EXPERIENCE</button>
          <button class="nav-button" id="qualification-btn">
            QUALIFICATION
          </button>
          <button class="nav-button" id="pro&cer-btn">
            PROJECT & CERTIFICATION
          </button>
          <button class="nav-button" id="contact-btn">CONTACT</button>
          <button class="nav-button" id="home-btn">
            <img src="home-logo-images-black-5.png" alt="Home" />
          </button>
        </div>
      </nav>
    </header>

    <main class="container contact-section">
      <h1 class="section-heading">CONTACT ME</h1>
      <section class="contact-grid">
        <div class="contact-item">
          <img class="contact-icon" src="phone.png" alt="Phone Icon" />
          <a href="tel:8890347664"><span>+91 8890347664</span></a>
        </div>
        <div class="contact-item">
          <img class="contact-icon" src="email.png" alt="Email Icon" />
          <a href="mailto:iamutkarshkaushal@gmail.com"
            ><span>iamutkarshkaushal@gmail.com</span></a
          >
        </div>
        <div class="contact-item">
          <img class="contact-icon" src="git.png" alt="GitHub Icon" />
          <a href="NA" target="_blank"><span>NA</span></a>
        </div>
        <div class="contact-item">
          <img class="contact-icon" src="linkedin.png" alt="LinkedIn Icon" />
          <a
            href="https://www.linkedin.com/in/utkarsh-kaushal-0b55521b6/"
            target="_blank"
          >
            <span>www.linkedin.com/in/utkarsh-kaushal...</span>
          </a>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2025 Utkarsh Kaushal. All Rights Reserved.</p>
    </footer>

    <script>
      document
        .getElementById("experience-btn")
        .addEventListener("click", () => {
          window.location.href = "experience.html";
        });
      document
        .getElementById("qualification-btn")
        .addEventListener("click", () => {
          window.location.href = "Qualification.html";
        });
      document.getElementById("pro&cer-btn").addEventListener("click", () => {
        window.location.href = "pro&cer.html";
      });
      document.getElementById("contact-btn").addEventListener("click", () => {
        window.location.href = "contact.html";
      });
      document.getElementById("home-btn").addEventListener("click", () => {
        window.location.href = "home.html";
      });

      const hamburger = document.querySelector(".hamburger-menu");
      const navLinks = document.querySelector(".nav-links");
      hamburger.addEventListener("click", () => {
        navLinks.classList.toggle("active");
      });
    </script>
  </body>
</html>
